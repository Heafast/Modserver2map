<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft server mapa</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #000;
    }

    .panel {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: rgba(20, 20, 20, 0.92);
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.4);
      width: 300px;
      max-height: calc(100vh - 24px);
      overflow: auto;
    }

    .panel h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .panel label {
      display: block;
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.9;
    }

    .panel input {
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
      margin-bottom: 4px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1d1d1d;
      color: white;
      font-size: 14px;
    }

    .panel button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #2d6cdf;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .panel button:hover {
      background: #245dc2;
    }

    .coords-box {
      margin-top: 10px;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.8;
    }

    @media (max-width: 700px) {
      .panel {
        width: calc(100% - 24px);
        left: 12px;
        right: 12px;
        top: 12px;
      }
    }

    /* ===== PIXEL MARKERS ===== */
    .pixel-marker {
      width: 18px;
      height: 18px;
      position: relative;
      image-rendering: pixelated;
    }

    .pixel-marker::before {
      content: "";
      position: absolute;
      inset: 0;
      box-sizing: border-box;
      border: 2px solid #111;
      box-shadow:
        inset -2px -2px 0 rgba(0,0,0,0.35),
        inset 2px 2px 0 rgba(255,255,255,0.12);
    }

    .pixel-marker::after {
      content: "";
      position: absolute;
      left: 6px;
      bottom: -6px;
      width: 6px;
      height: 6px;
      background: inherit;
      border-left: 2px solid #111;
      border-bottom: 2px solid #111;
      transform: rotate(-45deg);
      box-sizing: border-box;
    }

    .marker-city {
      background: #c1121f;
    }

    .marker-structure {
      background: #163a70;
    }

    /* ===== TEXT LABELS ===== */
    .state-label {
      color: #e5e5e5;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow:
        3px 3px 0 rgba(0,0,0,0.7),
        -1px -1px 0 rgba(0,0,0,0.7),
        1px -1px 0 rgba(0,0,0,0.7),
        -1px 1px 0 rgba(0,0,0,0.7);
      white-space: nowrap;
      pointer-events: none;
      image-rendering: pixelated;
    }

    .region-label {
      color: #d6d6d6;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow:
        2px 2px 0 rgba(0,0,0,0.7),
        -1px -1px 0 rgba(0,0,0,0.7),
        1px -1px 0 rgba(0,0,0,0.7),
        -1px 1px 0 rgba(0,0,0,0.7);
      white-space: nowrap;
      pointer-events: none;
    }

    .river-label {
      color: #5ec3ff;
      font-size: 20px;
      font-weight: bold;
      font-style: italic;
      text-shadow:
        2px 2px 0 rgba(0,0,0,0.65),
        -1px -1px 0 rgba(0,0,0,0.65),
        1px -1px 0 rgba(0,0,0,0.65),
        -1px 1px 0 rgba(0,0,0,0.65);
      white-space: nowrap;
      pointer-events: none;
      image-rendering: pixelated;
    }

    .lake-label {
      color: #7fd0ff;
      font-size: 20px;
      font-weight: bold;
      text-shadow:
        2px 2px 0 rgba(0,0,0,0.65),
        -1px -1px 0 rgba(0,0,0,0.65),
        1px -1px 0 rgba(0,0,0,0.65),
        -1px 1px 0 rgba(0,0,0,0.65);
      white-space: nowrap;
      pointer-events: none;
      image-rendering: pixelated;
    }

    .sea-label {
      color: #2ea8ff;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow:
        3px 3px 0 rgba(0,0,0,0.7),
        -1px -1px 0 rgba(0,0,0,0.7),
        1px -1px 0 rgba(0,0,0,0.7),
        -1px 1px 0 rgba(0,0,0,0.7);
      white-space: nowrap;
      pointer-events: none;
      image-rendering: pixelated;
    }

    .canal-label {
      color: #7ac8ff;
      font-size: 18px;
      font-weight: bold;
      text-shadow:
        2px 2px 0 rgba(0,0,0,0.65),
        -1px -1px 0 rgba(0,0,0,0.65),
        1px -1px 0 rgba(0,0,0,0.65),
        -1px 1px 0 rgba(0,0,0,0.65);
      white-space: nowrap;
      pointer-events: none;
      image-rendering: pixelated;
    }

    .strait-label {
      color: #8fd6ff;
      font-size: 18px;
      font-weight: bold;
      text-shadow:
        2px 2px 0 rgba(0,0,0,0.65),
        -1px -1px 0 rgba(0,0,0,0.65),
        1px -1px 0 rgba(0,0,0,0.65),
        -1px 1px 0 rgba(0,0,0,0.65);
      white-space: nowrap;
      pointer-events: none;
      image-rendering: pixelated;
    }

    .waterfall-label {
      color: #b6e6ff;
      font-size: 17px;
      font-weight: bold;
      text-shadow:
        2px 2px 0 rgba(0,0,0,0.65),
        -1px -1px 0 rgba(0,0,0,0.65),
        1px -1px 0 rgba(0,0,0,0.65),
        -1px 1px 0 rgba(0,0,0,0.65);
      white-space: nowrap;
      pointer-events: none;
      image-rendering: pixelated;
    }

    .landform-label {
      color: #d9d2b0;
      font-size: 20px;
      font-weight: bold;
      text-shadow:
        2px 2px 0 rgba(0,0,0,0.7),
        -1px -1px 0 rgba(0,0,0,0.7),
        1px -1px 0 rgba(0,0,0,0.7),
        -1px 1px 0 rgba(0,0,0,0.7);
      white-space: nowrap;
      pointer-events: none;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h2>Server mapa</h2>

    <label for="coordX">Minecraft X</label>
    <input id="coordX" type="number" placeholder="napr. 1200" />

    <label for="coordZ">Minecraft Z</label>
    <input id="coordZ" type="number" placeholder="napr. -3400" />

    <button id="goToCoords">Prejsť na súradnice</button>
    <button id="resetView">Reset pohľadu</button>

    <div class="coords-box" id="clickedCoords">
      Klikni na mapu a ukážu sa MC súradnice.
    </div>

    <div class="coords-box">
      <strong>Filtre</strong><br>

      <label style="display:flex; align-items:center; gap:8px; margin-top:8px;">
        <input type="checkbox" id="toggleCities" checked />
        Mestá
      </label>

      <label style="display:flex; align-items:center; gap:8px; margin-top:8px;">
        <input type="checkbox" id="toggleStructures" checked />
        Štruktúry
      </label>

      <label style="display:flex; align-items:center; gap:8px; margin-top:8px;">
        <input type="checkbox" id="toggleWater" checked />
        Voda
      </label>

      <label style="display:flex; align-items:center; gap:8px; margin-top:8px;">
        <input type="checkbox" id="toggleStates" checked />
        Štáty
      </label>

      <label style="display:flex; align-items:center; gap:8px; margin-top:8px;">
        <input type="checkbox" id="toggleRegions" checked />
        Regióny
      </label>

      <label style="display:flex; align-items:center; gap:8px; margin-top:8px;">
        <input type="checkbox" id="toggleLandforms" checked />
        Prírodné oblasti
      </label>
    </div>

    <div class="hint">
      Mapa je nastavená na rozsah X/Z od -7000 do +7000.
    </div>
  </div>

  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // ===== ZÁKLAD MAPY =====
    const imageWidth = 14000;
    const imageHeight = 14000;

    const mcMinX = -7000;
    const mcMaxX = 7000;
    const mcMinZ = -7000;
    const mcMaxZ = 7000;

    const bounds = [[0, 0], [imageHeight, imageWidth]];

    const map = L.map('map', {
      crs: L.CRS.Simple,
      minZoom: -4,
      maxZoom: 2,
      zoomSnap: 0.25,
      zoomDelta: 0.25,
      maxBounds: bounds,
      maxBoundsViscosity: 1.0
    });

    L.imageOverlay('mapa.jpg', bounds).addTo(map);
    map.fitBounds(bounds);

    let searchMarker = null;

    function mcToPixel(x, z) {
      const px = x - mcMinX;
      const py = mcMaxZ - z;
      return [py, px];
    }

    function pixelToMc(py, px) {
      const x = Math.round(px + mcMinX);
      const z = Math.round(mcMaxZ - py);
      return { x, z };
    }

    // ===== VÝBER SÚRADNÍC =====
    map.on('click', function(e) {
      const py = e.latlng.lat;
      const px = e.latlng.lng;
      const mc = pixelToMc(py, px);

      document.getElementById('clickedCoords').innerHTML =
        `<strong>Posledný klik:</strong><br>X: ${mc.x}<br>Z: ${mc.z}`;

      if (searchMarker) {
        map.removeLayer(searchMarker);
      }

      searchMarker = L.marker([py, px]).addTo(map)
        .bindPopup(`X: ${mc.x}<br>Z: ${mc.z}`)
        .openPopup();
    });

    document.getElementById('goToCoords').addEventListener('click', function() {
      const x = parseInt(document.getElementById('coordX').value, 10);
      const z = parseInt(document.getElementById('coordZ').value, 10);

      if (isNaN(x) || isNaN(z)) {
        alert('Zadaj platné X a Z súradnice.');
        return;
      }

      if (x < mcMinX || x > mcMaxX || z < mcMinZ || z > mcMaxZ) {
        alert('Tieto súradnice sú mimo mapy (-7000 až +7000).');
        return;
      }

      const [py, px] = mcToPixel(x, z);
      map.setView([py, px], 0);

      if (searchMarker) {
        map.removeLayer(searchMarker);
      }

      searchMarker = L.marker([py, px]).addTo(map)
        .bindPopup(`X: ${x}<br>Z: ${z}`)
        .openPopup();

      document.getElementById('clickedCoords').innerHTML =
        `<strong>Nájdené súradnice:</strong><br>X: ${x}<br>Z: ${z}`;
    });

    document.getElementById('resetView').addEventListener('click', function() {
      map.fitBounds(bounds);
    });

    // ===== IKONY =====
    const cityIcon = L.divIcon({
      className: '',
      html: `<div class="pixel-marker marker-city"></div>`,
      iconSize: [18, 24],
      iconAnchor: [9, 24],
      popupAnchor: [0, -20]
    });

    const structureIcon = L.divIcon({
      className: '',
      html: `<div class="pixel-marker marker-structure"></div>`,
      iconSize: [18, 24],
      iconAnchor: [9, 24],
      popupAnchor: [0, -20]
    });

    // ===== VRSTVY =====
    const citiesLayer = L.layerGroup().addTo(map);
    const structuresLayer = L.layerGroup().addTo(map);
    const waterLayer = L.layerGroup().addTo(map);
    const statesLayer = L.layerGroup().addTo(map);
    const regionsLayer = L.layerGroup().addTo(map);
    const landformsLayer = L.layerGroup().addTo(map);

    // ===== REGISTRE PRE VIDITEĽNOSŤ =====
    const allVisibilityUpdaters = [];

    function registerUpdater(fn) {
      allVisibilityUpdaters.push(fn);
      fn();
    }

    function isChecked(id) {
      return document.getElementById(id).checked;
    }

    function refreshVisibility() {
      allVisibilityUpdaters.forEach(fn => fn());
    }

    // ===== FUNKCIE =====
    function addCity(name, x, z, type, state, minZoom = -999) {
      const marker = L.marker(mcToPixel(x, z), { icon: cityIcon })
        .bindPopup(`
          <b>${name}</b><br>
          Typ: ${type}<br>
          Štát: ${state}<br>
          Súradnice: X ${x}, Z ${z}
        `);

      registerUpdater(() => {
        if (isChecked("toggleCities") && map.getZoom() >= minZoom) {
          if (!citiesLayer.hasLayer(marker)) citiesLayer.addLayer(marker);
        } else {
          if (citiesLayer.hasLayer(marker)) citiesLayer.removeLayer(marker);
        }
      });

      return marker;
    }

    function addStructure(name, x, z, type, state, minZoom = -1.5) {
      const marker = L.marker(mcToPixel(x, z), { icon: structureIcon })
        .bindPopup(`
          <b>${name}</b><br>
          Typ: ${type}<br>
          Štát: ${state}<br>
          Súradnice: X ${x}, Z ${z}
        `);

      registerUpdater(() => {
        if (isChecked("toggleStructures") && map.getZoom() >= minZoom) {
          if (!structuresLayer.hasLayer(marker)) structuresLayer.addLayer(marker);
        } else {
          if (structuresLayer.hasLayer(marker)) structuresLayer.removeLayer(marker);
        }
      });

      return marker;
    }

    function addTextLabel(layer, toggleId, x, z, html, iconWidth, iconHeight, minZoom = -999, maxZoom = 999) {
      const label = L.marker(mcToPixel(x, z), {
        icon: L.divIcon({
          className: '',
          html,
          iconSize: [iconWidth, iconHeight],
          iconAnchor: [iconWidth / 2, iconHeight / 2]
        }),
        interactive: false
      });

      registerUpdater(() => {
        const zoom = map.getZoom();
        if (isChecked(toggleId) && zoom >= minZoom && zoom <= maxZoom) {
          if (!layer.hasLayer(label)) layer.addLayer(label);
        } else {
          if (layer.hasLayer(label)) layer.removeLayer(label);
        }
      });

      return label;
    }

    function addWater(name, type, x, z, className, iconWidth, iconHeight, minZoom = -999, maxZoom = 999) {
      return addTextLabel(
        waterLayer,
        "toggleWater",
        x,
        z,
        `<div class="${className}">${name}</div>`,
        iconWidth,
        iconHeight,
        minZoom,
        maxZoom
      );
    }

    function addState(name, points, borderColor, labelX = null, labelZ = null, labelMaxZoom = -1.5) {
      const polygon = L.polygon(points.map(p => mcToPixel(p.x, p.z)), {
        color: borderColor,
        weight: 7.5,
        fillOpacity: 0
      });

      polygon.on("click", function(e) {
        const mc = pixelToMc(e.latlng.lat, e.latlng.lng);
        L.popup()
          .setLatLng(e.latlng)
          .setContent(`
            <b>${name}</b><br>
            Typ: štát<br><br>
            X: ${mc.x}<br>
            Z: ${mc.z}
          `)
          .openOn(map);
      });

      registerUpdater(() => {
        if (isChecked("toggleStates")) {
          if (!statesLayer.hasLayer(polygon)) statesLayer.addLayer(polygon);
        } else {
          if (statesLayer.hasLayer(polygon)) statesLayer.removeLayer(polygon);
        }
      });

      if (labelX !== null && labelZ !== null) {
        addTextLabel(
          statesLayer,
          "toggleStates",
          labelX,
          labelZ,
          `<div class="state-label">${name}</div>`,
          340,
          36,
          -999,
          labelMaxZoom
        );
      }

      return polygon;
    }

    function addRegion(name, state, points, labelX, labelZ, minZoom = -1.5, maxZoom = -0.5, options = {}) {
      const polygon = L.polygon(points.map(p => mcToPixel(p.x, p.z)), {
        color: options.color || "#8f8f8f",
        weight: options.weight || 2,
        fillColor: options.fillColor || "#b5b5b5",
        fillOpacity: options.fillOpacity ?? 0
      });

      polygon.on("click", function(e) {
        const mc = pixelToMc(e.latlng.lat, e.latlng.lng);
        L.popup()
          .setLatLng(e.latlng)
          .setContent(`
            <b>${name}</b><br>
            Štát: ${state}<br><br>
            X: ${mc.x}<br>
            Z: ${mc.z}
          `)
          .openOn(map);
      });

      registerUpdater(() => {
        if (isChecked("toggleRegions")) {
          if (!regionsLayer.hasLayer(polygon)) regionsLayer.addLayer(polygon);
        } else {
          if (regionsLayer.hasLayer(polygon)) regionsLayer.removeLayer(polygon);
        }
      });

      addTextLabel(
        regionsLayer,
        "toggleRegions",
        labelX,
        labelZ,
        `<div class="region-label">${name}</div>`,
        options.labelWidth || 180,
        options.labelHeight || 28,
        minZoom,
        maxZoom
      );

      return polygon;
    }

    function addLandmarkArea(name, type, x, z, minZoom = -2, maxZoom = 0, className = "landform-label", width = 220, height = 28) {
      return addTextLabel(
        landformsLayer,
        "toggleLandforms",
        x,
        z,
        `<div class="${className}">${name}</div>`,
        width,
        height,
        minZoom,
        maxZoom
      );
    }

    // ===== ŠTÁTY =====
    addState("Neutrálna oblasť", [
      { x: 48, z: -354 },
      { x: 364, z: -528 },
      { x: 651, z: -632 },
      { x: 966, z: -630 },
      { x: 1409, z: -392 },
      { x: 1387, z: -114 },
      { x: 1132, z: 163 },
      { x: 523, z: 359 },
      { x: 110, z: 283 },
      { x: -53, z: 11 },
      { x: 40, z: -343 }
    ], "#9a9a9a", 700, -120, -1.5);
addState("Valkýria", [
  { x: 1128, z: 176 },
  { x: 1522, z: 598 },
  { x: 1252, z: 902 },

  { x: -710, z: 4488 },

  { x: -1732, z: 4056 },

  { x: -1152, z: 3926 },
  { x: -894, z: 3820 },

  { x: -674, z: 3648 },
  { x: -306, z: 3032 },

  { x: -236, z: 836 },
  { x: 328, z: 822 },
  { x: 686, z: 644 },
  { x: 516, z: 346 }
], "#c1121f", 1710, 2026, -1.5);
    // Príklady pre ďalšie štáty:
    // addState("Valkýria", [ ...body... ], "#c1121f", x, z, -1.5);
    // addState("Grankolandia", [ ...body... ], "#e0c100", x, z, -1.5);
    // addState("Norddeutschland", [ ...body... ], "#2a6fff", x, z, -1.5);

    // ===== REGIÓNY VALKÝRIE =====
     addRegion("Fragment", "Valkýria", [
      { x: -1072, z: 4210 },
      { x: -884, z: 4236 },
      { x: -719, z: 4479 },

addRegion("Panjam", "Valkýria", [

addRegion("Nóra", "Valkýria", [

addRegion("Skyland", "Valkýria", [
