<script>
const imageWidth = 14000;
const imageHeight = 14000;

const mcMinX = -7000;
const mcMaxZ = 7000;

const bounds = [[0, 0], [imageHeight, imageWidth]];

const map = L.map("map", {
  crs: L.CRS.Simple,
  minZoom: -4,
  maxZoom: 2
});

L.imageOverlay("mapa.jpg", bounds).addTo(map);
map.fitBounds(bounds);

const statesLayer = L.layerGroup().addTo(map);
const regionsLayer = L.layerGroup().addTo(map);

// ===== PREPOČTY =====
function mcToPixel(x, z) {
  return [mcMaxZ - z, x - mcMinX];
}

// ===== STRED POLYGÓNU =====
function getCenter(points) {
  let x = 0, z = 0;
  points.forEach(p => {
    x += p.x;
    z += p.z;
  });
  return {
    x: x / points.length,
    z: z / points.length
  };
}

// ===== LABEL =====
function addLabel(layer, text, x, z, className, minZoom, maxZoom) {
  const label = L.marker(mcToPixel(x, z), {
    icon: L.divIcon({
      className: "",
      html: `<div class="${className}">${text}</div>`
    }),
    interactive: false
  });

  map.on("zoomend", () => {
    const zLevel = map.getZoom();
    if (zLevel >= minZoom && zLevel <= maxZoom) {
      if (!layer.hasLayer(label)) layer.addLayer(label);
    } else {
      if (layer.hasLayer(label)) layer.removeLayer(label);
    }
  });

  layer.addLayer(label);
}

// ===== STATE =====
function addState(name, points, color) {

  const poly = L.polygon(points.map(p => mcToPixel(p.x, p.z)), {
    color: color,
    weight: 4,
    fillOpacity: 0.2
  }).addTo(statesLayer);

  const center = getCenter(points);

  addLabel(statesLayer, name, center.x, center.z, "state-label", -4, -1);

}

// ===== REGION =====
function addRegion(name, points) {

  const poly = L.polygon(points.map(p => mcToPixel(p.x, p.z)), {
    color: "#ff6b6b",
    weight: 2
  }).addTo(regionsLayer);

  const center = getCenter(points);

  addLabel(regionsLayer, name, center.x, center.z, "region-label", -2, 2);

}

// ===== TEST DATA =====

addState("Valkýria", [
  { x: 1128, z: 176 },
  { x: 2401, z: 1105 },
  { x: 236, z: 3998 },
  { x: -1423, z: 5170 },
  { x: -3923, z: 4009 },
  { x: -674, z: 3648 },
  { x: -236, z: 836 },
  { x: 516, z: 346 }
], "#c1121f");

addState("Grankolandia", [
  { x: 6830, z: 32 },
  { x: 5483, z: 2072 },
  { x: 2300, z: -7000 },
  { x: 7000, z: -7000 },
  { x: 7000, z: -230 }
], "#d9b300");

addRegion("Panjam", [
  { x: -1072, z: 4717 },
  { x: -1292, z: 4561 },
  { x: -1740, z: 4059 },
  { x: -895, z: 3832 },
  { x: -271, z: 4207 }
]);

addRegion("Nóra Valley", [
  { x: -671, z: 3652 },
  { x: -176, z: 3153 },
  { x: 32, z: 3780 },
  { x: 241, z: 3998 }
]);

</script>
