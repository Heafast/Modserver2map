<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Minecraft mapa</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #111;
}

#map {
  width: 100%;
  height: 100%;
}

/* ===== LABELY ===== */

.state-label {
  color: white;
  font-size: 26px;
  font-weight: bold;
  text-shadow: 3px 3px 0 black;
  pointer-events: none;
}

.region-label {
  color: #ffe680;
  font-size: 18px;
  font-weight: bold;
  text-shadow: 2px 2px 0 black;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ===== NASTAVENIA =====
const SIZE = 14000;
const MIN = -7000;
const MAX = 7000;

// ===== MAPA =====
const map = L.map("map", {
  crs: L.CRS.Simple,
  minZoom: -4,
  maxZoom: 2
});

const bounds = [[0,0],[SIZE,SIZE]];
L.imageOverlay("mapa.jpg", bounds).addTo(map);
map.fitBounds(bounds);

// ===== LAYERS =====
const statesLayer = L.layerGroup().addTo(map);
const regionsLayer = L.layerGroup().addTo(map);

// ===== PREVOD =====
function mcToPixel(x,z){
  return [MAX - z, x - MIN];
}

// ===== STRED POLYGÓNU =====
function getCenter(points){
  let x=0,z=0;
  points.forEach(p=>{
    x+=p.x;
    z+=p.z;
  });
  return {x:x/points.length, z:z/points.length};
}

// ===== LABEL =====
function createLabel(layer, text, x, z, className){
  const label = L.marker(mcToPixel(x,z),{
    icon: L.divIcon({
      className:"",
      html:`<div class="${className}">${text}</div>`
    }),
    interactive:false
  });
  layer.addLayer(label);
}

// ===== STATE =====
function addState(name, points, color){

  const polygon = L.polygon(
    points.map(p=>mcToPixel(p.x,p.z)),
    {
      color:"#808080",
      weight:4,
      fillColor:color,
      fillOpacity:0.25
    }
  ).addTo(statesLayer);

  const center = getCenter(points);

  createLabel(statesLayer, name, center.x, center.z, "state-label");
}

// ===== REGION =====
function addRegion(name, points){

  const polygon = L.polygon(
    points.map(p=>mcToPixel(p.x,p.z)),
    {
      color:"#ff6b6b",
      weight:2,
      fillOpacity:0
    }
  ).addTo(regionsLayer);

  const center = getCenter(points);

  createLabel(regionsLayer, name, center.x, center.z, "region-label");
}

// ===== DATA =====

// ŠTÁTY
addState("Valkýria", [
  { x: 1128, z: 176 },
  { x: 2401, z: 1105 },
  { x: 236, z: 3998 },
  { x: -1423, z: 5170 },
  { x: -3923, z: 4009 },
  { x: -674, z: 3648 },
  { x: -236, z: 836 },
  { x: 516, z: 346 }
], "#c1121f");

addState("Grankolandia", [
  { x: 6830, z: 32 },
  { x: 5483, z: 2072 },
  { x: 2300, z: -7000 },
  { x: 7000, z: -7000 },
  { x: 7000, z: -230 }
], "#d9b300");

addState("Berlin & Staliningrad", [
  { x: 2300, z: -7000 },
  { x: 2299, z: -2768 },
  { x: 1533, z: -63 },
  { x: -1047, z: -574 },
  { x: -1566, z: -7000 }
], "#33c7c7");

// REGIÓNY
addRegion("Panjam", [
  { x: -1072, z: 4717 },
  { x: -1292, z: 4561 },
  { x: -1740, z: 4059 },
  { x: -895, z: 3832 },
  { x: -271, z: 4207 }
]);

addRegion("Nóra Valley", [
  { x: -671, z: 3652 },
  { x: -176, z: 3153 },
  { x: 32, z: 3780 },
  { x: 241, z: 3998 }
]);

</script>

</body>
</html>
