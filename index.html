<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft server mapa</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    .state-label {
  color: #ffffff;
  font-size: 26px;
  font-weight: bold;
  letter-spacing: 2px;
  text-shadow:
    3px 3px 0 rgba(0,0,0,0.8),
    -1px -1px 0 rgba(0,0,0,0.8),
    1px -1px 0 rgba(0,0,0,0.8),
    -1px 1px 0 rgba(0,0,0,0.8);
  pointer-events: none;
}

.region-label {
  color: #ffe680;
  font-size: 18px;
  font-weight: bold;
  text-shadow:
    2px 2px 0 rgba(0,0,0,0.8),
    -1px -1px 0 rgba(0,0,0,0.8);
  pointer-events: none;
}
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #000;
    }

    .menu-toggle {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1200;
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 12px;
      background: rgba(20, 20, 20, 0.95);
      color: white;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .menu-toggle:hover {
      background: rgba(35, 35, 35, 0.98);
    }

    .panel {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1100;
      background: rgba(20, 20, 20, 0.95);
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
      width: 340px;
      max-height: calc(100vh - 24px);
      overflow: auto;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.25s ease, opacity 0.25s ease;
      transform: translateX(-380px);
    }

    .panel.open {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    .panel h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
      padding-right: 42px;
    }

    .close-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      background: #2a2a2a;
      color: white;
      cursor: pointer;
      font-size: 18px;
    }

    .close-panel:hover {
      background: #3a3a3a;
    }

    .panel label {
      display: block;
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.92;
    }

    .panel input[type="number"],
    .panel input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
      margin-bottom: 4px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1d1d1d;
      color: white;
      font-size: 14px;
    }

    .panel input[type="checkbox"] {
      width: auto;
      margin: 0;
      padding: 0;
      accent-color: #2d6cdf;
    }

    .panel button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #2d6cdf;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .panel button:hover {
      background: #245dc2;
    }

    .coords-box {
      margin-top: 10px;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.8;
    }

    .search-results {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .search-result-item {
      padding: 10px;
      border-radius: 8px;
      background: #222;
      border: 1px solid #333;
      cursor: pointer;
    }

    .search-result-item:hover {
      background: #2c2c2c;
    }

    .search-result-title {
      font-weight: bold;
      font-size: 14px;
    }

    .search-result-meta {
      margin-top: 3px;
      font-size: 12px;
      opacity: 0.8;
    }

    .search-empty {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.75;
    }

    .section-title {
      margin-top: 12px;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      opacity: 0.85;
    }

    @media (max-width: 900px) {
      .panel {
        width: calc(100% - 24px);
        transform: translateX(calc(-100% - 20px));
      }
    }

    .pixel-marker {
      width: 18px;
      height: 18px;
      position: relative;
      image-rendering: pixelated;
    }

    .pixel-marker::before {
      content: "";
      position: absolute;
      inset: 0;
      box-sizing: border-box;
      border: 2px solid #111;
      box-shadow:
        inset -2px -2px 0 rgba(0, 0, 0, 0.35),
        inset 2px 2px 0 rgba(255, 255, 255, 0.12);
    }

    .pixel-marker::after {
      content: "";
      position: absolute;
      left: 6px;
      bottom: -6px;
      width: 6px;
      height: 6px;
      background: inherit;
      border-left: 2px solid #111;
      border-bottom: 2px solid #111;
      transform: rotate(-45deg);
      box-sizing: border-box;
    }

    .marker-city { background: #c1121f; }
    .marker-structure { background: #163a70; }

    .river-label,
    .lake-label,
    .sea-label,
    .canal-label,
    .strait-label,
    .waterfall-label,
    .landform-label,
    .custom-label {
      white-space: nowrap;
      pointer-events: none;
      image-rendering: pixelated;
      font-weight: bold;
    }

    .river-label {
      color: #5ec3ff;
      font-size: 20px;
      font-style: italic;
      text-shadow:
        2px 2px 0 rgba(0, 0, 0, 0.65),
        -1px -1px 0 rgba(0, 0, 0, 0.65),
        1px -1px 0 rgba(0, 0, 0, 0.65),
        -1px 1px 0 rgba(0, 0, 0, 0.65);
    }

    .lake-label {
      color: #7fd0ff;
      font-size: 20px;
      text-shadow:
        2px 2px 0 rgba(0, 0, 0, 0.65),
        -1px -1px 0 rgba(0, 0, 0, 0.65),
        1px -1px 0 rgba(0, 0, 0, 0.65),
        -1px 1px 0 rgba(0, 0, 0, 0.65);
    }

    .sea-label {
      color: #2ea8ff;
      font-size: 28px;
      letter-spacing: 2px;
      text-shadow:
        3px 3px 0 rgba(0, 0, 0, 0.7),
        -1px -1px 0 rgba(0, 0, 0, 0.7),
        1px -1px 0 rgba(0, 0, 0, 0.7),
        -1px 1px 0 rgba(0, 0, 0, 0.7);
    }

    .canal-label,
    .strait-label,
    .waterfall-label,
    .landform-label,
    .custom-label {
      text-shadow:
        2px 2px 0 rgba(0, 0, 0, 0.65),
        -1px -1px 0 rgba(0, 0, 0, 0.65),
        1px -1px 0 rgba(0, 0, 0, 0.65),
        -1px 1px 0 rgba(0, 0, 0, 0.65);
    }

    .canal-label, .strait-label { color: #8fd6ff; font-size: 18px; }
    .waterfall-label { color: #b6e6ff; font-size: 17px; }
    .landform-label { color: #d9d2b0; font-size: 20px; }
    .custom-label { color: #ffe680; font-size: 18px; }
  </style>
</head>
<body>
  <button class="menu-toggle" id="menuToggle" title="Otvoriť menu">☰</button>

  <div class="panel" id="sidePanel">
    <button class="close-panel" id="closeLeftPanel" title="Zavrieť">×</button>
    <h2>Server mapa</h2>

    <div class="section-title">Vyhľadávanie</div>
    <label for="searchInput">Názov mesta / štruktúry / štátu / regiónu / vody</label>
    <input id="searchInput" type="text" placeholder="napr. Valkýria, Panjam, Norfolk..." autocomplete="off" />
    <div id="searchResults" class="search-results"></div>

    <div class="section-title">Súradnice</div>
    <label for="coordX">Minecraft X</label>
    <input id="coordX" type="number" placeholder="napr. 1200" />

    <label for="coordZ">Minecraft Z</label>
    <input id="coordZ" type="number" placeholder="napr. -3400" />

    <button id="goToCoords">Prejsť na súradnice</button>
    <button id="resetView">Reset pohľadu</button>

    <div class="coords-box" id="clickedCoords">
      Klikni na mapu a ukážu sa MC súradnice.
    </div>

    <div class="coords-box">
      <strong>Filtre</strong><br>

      <label style="display:flex; align-items:center; gap:8px; margin-top:8px;">
        <input type="checkbox" id="toggleCities" checked />
        Mestá
      </label>

      <label style="display:flex; align-items:center; gap:8px; margin-top:8px;">
        <input type="checkbox" id="toggleStructures" checked />
        Štruktúry
      </label>

      <label style="display:flex; align-items:center; gap:8px; margin-top:8px;">
        <input type="checkbox" id="toggleWater" checked />
        Voda
      </label>

      <label style="display:flex; align-items:center; gap:8px; margin-top:8px;">
        <input type="checkbox" id="toggleStates" checked />
        Štáty
      </label>

      <label style="display:flex; align-items:center; gap:8px; margin-top:8px;">
        <input type="checkbox" id="toggleRegions" checked />
        Regióny
      </label>

      <label style="display:flex; align-items:center; gap:8px; margin-top:8px;">
        <input type="checkbox" id="toggleLandforms" checked />
        Prírodné oblasti
      </label>
    </div>

    <div class="hint">
      Mapa je nastavená na rozsah X/Z od -7000 do +7000.
    </div>
  </div>

  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    const imageWidth = 14000;
    const imageHeight = 14000;

    const mcMinX = -7000;
    const mcMaxX = 7000;
    const mcMinZ = -7000;
    const mcMaxZ = 7000;

    const bounds = [[0, 0], [imageHeight, imageWidth]];

    const map = L.map("map", {
      crs: L.CRS.Simple,
      minZoom: -4,
      maxZoom: 2,
      zoomSnap: 0.25,
      zoomDelta: 0.25,
      maxBounds: bounds,
      maxBoundsViscosity: 1.0
    });

    L.imageOverlay("mapa.jpg", bounds).addTo(map);
    map.fitBounds(bounds);

    let searchMarker = null;

    function mcToPixel(x, z) {
      const px = x - mcMinX;
      const py = mcMaxZ - z;
      return [py, px];
    }
function getPolygonCenter(points) {
  let x = 0, z = 0;
  points.forEach(p => {
    x += p.x;
    z += p.z;
  });
  return {
    x: x / points.length,
    z: z / points.length
  };
}
    function pixelToMc(py, px) {
      const x = Math.round(px + mcMinX);
      const z = Math.round(mcMaxZ - py);
      return { x, z };
    }

    function normalizeText(text) {
      return (text || "")
        .toString()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
    }

    const sidePanel = document.getElementById("sidePanel");
    const menuToggle = document.getElementById("menuToggle");

    function togglePanel(panel) {
      panel.classList.toggle("open");
    }

    menuToggle.addEventListener("click", () => togglePanel(sidePanel));
    document.getElementById("closeLeftPanel").addEventListener("click", () => sidePanel.classList.remove("open"));

    const cityIcon = L.divIcon({
      className: "",
      html: `<div class="pixel-marker marker-city"></div>`,
      iconSize: [18, 24],
      iconAnchor: [9, 24],
      popupAnchor: [0, -20]
    });

    const structureIcon = L.divIcon({
      className: "",
      html: `<div class="pixel-marker marker-structure"></div>`,
      iconSize: [18, 24],
      iconAnchor: [9, 24],
      popupAnchor: [0, -20]
    });

    const citiesLayer = L.layerGroup().addTo(map);
    const structuresLayer = L.layerGroup().addTo(map);
    const waterLayer = L.layerGroup().addTo(map);
    const statesLayer = L.layerGroup().addTo(map);
    const regionsLayer = L.layerGroup().addTo(map);
    const landformsLayer = L.layerGroup().addTo(map);

    const allVisibilityUpdaters = [];
    const searchableItems = [];

    function registerUpdater(fn) {
      allVisibilityUpdaters.push(fn);
      fn();
    }

    function isChecked(id) {
      return document.getElementById(id).checked;
    }

    function refreshVisibility() {
      allVisibilityUpdaters.forEach(fn => fn());
    }

    function addToSearchIndex(item) {
      searchableItems.push(item);
    }

    function flyToMcCoords(x, z, zoom = 0, popupHtml = null) {
      const [py, px] = mcToPixel(x, z);
      map.setView([py, px], zoom);

      if (searchMarker) {
        map.removeLayer(searchMarker);
      }

      searchMarker = L.marker([py, px]).addTo(map);
      if (popupHtml) {
        searchMarker.bindPopup(popupHtml).openPopup();
      }

      document.getElementById("clickedCoords").innerHTML =
        `<strong>Zvolený bod:</strong><br>X: ${x}<br>Z: ${z}`;
    }

    function ensureVisibleForSearch(item) {
      const toggleMap = {
        city: "toggleCities",
        structure: "toggleStructures",
        water: "toggleWater",
        state: "toggleStates",
        region: "toggleRegions",
        landform: "toggleLandforms",
        customLabel: "toggleLandforms"
      };

      const toggleId = toggleMap[item.kind];
      if (toggleId && document.getElementById(toggleId)) {
        document.getElementById(toggleId).checked = true;
      }
      refreshVisibility();
    }

    function getSearchLabel(item) {
      const extra = [];
      if (item.subtype) extra.push(item.subtype);
      if (item.state) extra.push(item.state);
      return extra.join(" • ");
    }

    function renderSearchResults(items) {
      const box = document.getElementById("searchResults");
      box.innerHTML = "";

      if (!items.length) {
        const div = document.createElement("div");
        div.className = "search-empty";
        div.textContent = "Nič sa nenašlo.";
        box.appendChild(div);
        return;
      }

      items.slice(0, 12).forEach(item => {
        const el = document.createElement("div");
        el.className = "search-result-item";
        el.innerHTML = `
          <div class="search-result-title">${item.name}</div>
          <div class="search-result-meta">${item.kindLabel}${getSearchLabel(item) ? " • " + getSearchLabel(item) : ""}</div>
        `;

        el.addEventListener("click", () => {
          ensureVisibleForSearch(item);
          flyToMcCoords(
            item.centerX,
            item.centerZ,
            item.zoom ?? 0,
            `<b>${item.name}</b><br>${item.kindLabel}${item.subtype ? `<br>Typ: ${item.subtype}` : ""}${item.state ? `<br>Štát: ${item.state}` : ""}<br>Súradnice: X ${item.centerX}, Z ${item.centerZ}`
          );
          sidePanel.classList.add("open");
        });

        box.appendChild(el);
      });
    }

    function searchItems(query) {
      const q = normalizeText(query.trim());
      if (!q) {
        document.getElementById("searchResults").innerHTML = "";
        return;
      }

      const results = searchableItems
        .filter(item => {
          return [item.name, item.kindLabel, item.subtype, item.state]
            .filter(Boolean)
            .some(value => normalizeText(value).includes(q));
        })
        .sort((a, b) => {
          const aStarts = normalizeText(a.name).startsWith(q) ? 1 : 0;
          const bStarts = normalizeText(b.name).startsWith(q) ? 1 : 0;
          return bStarts - aStarts || a.name.localeCompare(b.name, "sk");
        });

      renderSearchResults(results);
    }

    function createTextLabel(layer, toggleId, x, z, html, iconWidth, iconHeight, minZoom = -999, maxZoom = 999) {
      const label = L.marker(mcToPixel(x, z), {
        icon: L.divIcon({
          className: "",
          html,
          iconSize: [iconWidth, iconHeight],
          iconAnchor: [iconWidth / 2, iconHeight / 2]
        }),
        interactive: false
      });

      registerUpdater(() => {
        const zoom = map.getZoom();
        if (isChecked(toggleId) && zoom >= minZoom && zoom <= maxZoom) {
          if (!layer.hasLayer(label)) layer.addLayer(label);
        } else {
          if (layer.hasLayer(label)) layer.removeLayer(label);
        }
      });

      return label;
    }

    function addCity(name, x, z, type, state, minZoom = -999) {
      const marker = L.marker(mcToPixel(x, z), { icon: cityIcon })
        .bindPopup(`
          <b>${name}</b><br>
          Typ: ${type}<br>
          Štát: ${state}<br>
          Súradnice: X ${x}, Z ${z}
        `);

      registerUpdater(() => {
        if (isChecked("toggleCities") && map.getZoom() >= minZoom) {
          if (!citiesLayer.hasLayer(marker)) citiesLayer.addLayer(marker);
        } else {
          if (citiesLayer.hasLayer(marker)) citiesLayer.removeLayer(marker);
        }
      });

      addToSearchIndex({
        kind: "city",
        kindLabel: "Mesto",
        name,
        subtype: type,
        state,
        centerX: x,
        centerZ: z,
        minZoom,
        maxZoom: 999,
        zoom: Math.max(minZoom, 0)
      });

      return marker;
    }

    function addStructure(name, x, z, type, state, minZoom = -1.5) {
      const marker = L.marker(mcToPixel(x, z), { icon: structureIcon })
        .bindPopup(`
          <b>${name}</b><br>
          Typ: ${type}<br>
          Štát: ${state}<br>
          Súradnice: X ${x}, Z ${z}
        `);

      registerUpdater(() => {
        if (isChecked("toggleStructures") && map.getZoom() >= minZoom) {
          if (!structuresLayer.hasLayer(marker)) structuresLayer.addLayer(marker);
        } else {
          if (structuresLayer.hasLayer(marker)) structuresLayer.removeLayer(marker);
        }
      });

      addToSearchIndex({
        kind: "structure",
        kindLabel: "Štruktúra",
        name,
        subtype: type,
        state,
        centerX: x,
        centerZ: z,
        minZoom,
        maxZoom: 999,
        zoom: Math.max(minZoom, 0)
      });

      return marker;
    }

 function addWater(name, type, x, z, className, iconWidth, iconHeight, minZoom = -999, maxZoom = 999) {
  createTextLabel(
    waterLayer,
    "toggleWater",
    x,
    z,
    `<div class="${className}">${name}</div>`,
    iconWidth,
    iconHeight,
    minZoom,
    maxZoom
  );

  addToSearchIndex({
    kind: "water",
    kindLabel: "Voda",
    name,
    subtype: type,
    centerX: x,
    centerZ: z,
    minZoom,
    maxZoom,
    zoom: Math.max(minZoom, 0)
  });
}

function addState(
  name,
  points,
  borderColor = "#808080",
  fillColor = borderColor,
  fillOpacity = 0.25,
  minZoom = -999,
  fillMaxZoom = -1.5,
  labelX = null,
  labelZ = null
) {
  const polygon = L.polygon(points.map(p => mcToPixel(p.x, p.z)), {
    color: borderColor,
    weight: 6,
    fillColor: fillColor,
    fillOpacity: 0
  });

  // CLICK
  polygon.on("click", function (e) {
    const mc = pixelToMc(e.latlng.lat, e.latlng.lng);

    document.getElementById("clickedCoords").innerHTML =
      `<strong>Posledný klik:</strong><br>X: ${mc.x}<br>Z: ${mc.z}`;

    if (searchMarker) {
      map.removeLayer(searchMarker);
    }

    searchMarker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map)
      .bindPopup(`
        <b>${name}</b><br>
        Typ: štát<br><br>
        X: ${mc.x}<br>
        Z: ${mc.z}
      `)
      .openPopup();
  });

  // VISIBILITY + FILL
  registerUpdater(() => {
    const zoom = map.getZoom();
    const show = isChecked("toggleStates") && zoom >= minZoom;

    if (show) {
      if (!statesLayer.hasLayer(polygon)) statesLayer.addLayer(polygon);

      polygon.setStyle({
        color: borderColor,
        fillColor: fillColor,
        fillOpacity: zoom <= fillMaxZoom ? fillOpacity : 0
      });
    } else {
      if (statesLayer.hasLayer(polygon)) statesLayer.removeLayer(polygon);
    }
  });

  // CENTER (manual override alebo auto)
  const center = (labelX !== null && labelZ !== null)
    ? { x: labelX, z: labelZ }
    : getPolygonCenter(points);

  // LABEL
  createTextLabel(
    statesLayer,
    "toggleStates",
    center.x,
    center.z,
    `<div class="state-label">${name}</div>`,
    260,
    30,
    -4,
    -1.2
  );

  // SEARCH
  addToSearchIndex({
    kind: "state",
    kindLabel: "Štát",
    name,
    centerX: center.x,
    centerZ: center.z,
    minZoom,
    maxZoom: 999,
    zoom: -1
  });

  return polygon;
}
function addRegion(
  name,
  state,
  points,
  borderColor = "#ff6b6b",
  minZoom = -1.5,
  labelX = null,
  labelZ = null
) {
  const polygon = L.polygon(points.map(p => mcToPixel(p.x, p.z)), {
    color: borderColor,
    weight: 3,
    fillOpacity: 0
  });

  // CLICK
  polygon.on("click", function (e) {
    const mc = pixelToMc(e.latlng.lat, e.latlng.lng);

    document.getElementById("clickedCoords").innerHTML =
      `<strong>Posledný klik:</strong><br>X: ${mc.x}<br>Z: ${mc.z}`;

    if (searchMarker) {
      map.removeLayer(searchMarker);
    }

    searchMarker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map)
      .bindPopup(`
        <b>${name}</b><br>
        Typ: región<br>
        Štát: ${state}<br><br>
        X: ${mc.x}<br>
        Z: ${mc.z}
      `)
      .openPopup();
  });

  // VISIBILITY
  registerUpdater(() => {
    if (isChecked("toggleRegions") && map.getZoom() >= minZoom) {
      if (!regionsLayer.hasLayer(polygon)) regionsLayer.addLayer(polygon);
    } else {
      if (regionsLayer.hasLayer(polygon)) regionsLayer.removeLayer(polygon);
    }
  });

  // CENTER (manual alebo auto)
  const center = (labelX !== null && labelZ !== null)
    ? { x: labelX, z: labelZ }
    : getPolygonCenter(points);

  // LABEL
  createTextLabel(
    regionsLayer,
    "toggleRegions",
    center.x,
    center.z,
    `<div class="region-label">${name}</div>`,
    200,
    24,
    -2,
    0
  );

  // SEARCH
  addToSearchIndex({
    kind: "region",
    kindLabel: "Región",
    name,
    state,
    centerX: center.x,
    centerZ: center.z,
    minZoom,
    maxZoom: 999,
    zoom: 0
  });

  return polygon;
}

        alert("Zadaj platné X a Z súradnice.");

        return;

        `<strong>Nájdené súradnice:</strong><br>X: ${x}<br>Z: ${z}`;
    });
